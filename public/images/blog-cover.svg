<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="coolGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="300" rx="20" fill="url(#coolGradient)" />
  
  <path d="M600 0 L800 0 L800 300 L700 300 Z" fill="#38bdf8" opacity="0.1" />

  <circle cx="140" cy="150" r="85" fill="none" stroke="#38bdf8" stroke-width="3" stroke-dasharray="10,5" />
  <circle cx="140" cy="150" r="75" fill="#1e293b" />
  <text x="140" y="155" font-family="monospace" font-size="14" fill="#38bdf8" text-anchor="middle">010101</text>
  
  <g font-family="system-ui, sans-serif" fill="#f8fafc">
    <text x="260" y="110" font-size="42" font-weight="800" letter-spacing="-1">ALOK PRASAD</text>
    
    <rect x="260" y="130" width="160" height="28" rx="14" fill="#38bdf8" />
    <text x="340" y="149" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">APP DEVELOPER</text>
    
    <text x="260" y="190" font-size="16" fill="#94a3b8">
      <tspan x="260" dy="1.2em">Building high-performance Android applications</tspan>
      <tspan x="260" dy="1.2em">and intelligent AI-driven solutions.</tspan>
    </text>
  </g>

  <g transform="translate(260, 250)">
    <circle cx="0" cy="0" r="15" fill="#334155" />
    <circle cx="45" cy="0" r="15" fill="#334155" />
    <circle cx="90" cy="0" r="15" fill="#334155" />
    <text x="0" y="5" font-family="monospace" font-size="10" fill="#38bdf8" text-anchor="middle">JS</text>
    <text x="45" y="5" font-family="monospace" font-size="10" fill="#38bdf8" text-anchor="middle">PY</text>
    <text x="90" y="5" font-family="monospace" font-size="10" fill="#38bdf8" text-anchor="middle">KT</text>
  </g>
</svg>
