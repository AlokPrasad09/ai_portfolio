<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <filter id="dropShadow" x="0" y="0" width="200%" height="200%">
      <feOffset result="offOut" in="SourceAlpha" dx="3" dy="3" />
      <feGaussianBlur result="blurOut" in="offOut" stdDeviation="3" />
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal" />
    </filter>
  </defs>

  <rect width="800" height="300" rx="15" ry="15" fill="url(#bgGradient)" />

  <circle cx="150" cy="150" r="100" fill="#fff" filter="url(#dropShadow)" stroke="#333" stroke-width="2"/>
  <text x="150" y="155" font-family="Arial, sans-serif" font-size="20" fill="#333" text-anchor="middle">Photo Here</text>
  
  <g font-family="Verdana, Geneva, sans-serif" fill="#333">
    <text x="300" y="90" font-size="36" font-weight="bold">Jane Doe</text>
    
    <text x="300" y="130" font-size="18" font-weight="bold" fill="#555">Creative Full-Stack Developer</text>
    
    <text x="300" y="170" font-size="14">
      <tspan x="300" dy="1.2em">Passionate about building intuitive web solutions.</tspan>
      <tspan x="300" dy="1.2em">I specialize in translating complex ideas into clean,</tspan>
      <tspan x="300" dy="1.2em">efficient code and beautiful user experiences.</tspan>
      <tspan x="300" dy="1.2em">Currently exploring AI integration and SVG animations.</tspan>
    </text>
  </g>
  
  <rect x="300" y="240" width="120" height="35" rx="5" ry="5" fill="#333" />
  <text x="360" y="263" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">CONTACT ME</text>
</svg>
